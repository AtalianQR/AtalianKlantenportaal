<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATALIAN — Groenonderhoud</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .groen-table { width:100%; border-collapse:collapse; font-size:12px; }
    .groen-table th { background:#f9fafb; font-size:11px; font-weight:600; color:var(--color-text-2); padding:8px 6px; text-align:center; border-bottom:1px solid var(--color-border); white-space:nowrap; }
    .groen-table th.col-site { text-align:left; padding-left:12px; width:130px; }
    .groen-table td { padding:6px 4px; text-align:center; border-bottom:1px solid #f0f2f5; vertical-align:middle; }
    .groen-table td.col-site { text-align:left; padding-left:12px; font-weight:600; font-size:12px; color:var(--color-dark); white-space:nowrap; }
    .groen-table tr.type-row td { font-size:11px; color:var(--color-text-2); background:#fafbfc; }
    .groen-table tr.type-row td.col-site { padding-left:24px; font-weight:400; }
    .groen-table tr:last-child td { border-bottom:none; }

    .dot { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; font-size:10px; font-weight:700; }
    .dot-done    { background:#e8f5d6; color:#3a7010; }
    .dot-plan    { background:#e8f0fb; color:#2a5da8; }
    .dot-none    { color:#ccc; font-size:16px; }

    .huidig-col { background:#fffbeb !important; }
    .maand-huidig { background:#fffbeb; }

    .legenda { display:flex; gap:20px; margin-top:14px; font-size:12px; color:var(--color-text-2); flex-wrap:wrap; }
    .legenda span { display:flex; align-items:center; gap:6px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <span class="logo"></span>
      <span class="client-selector">Vlaeminck Logistics ▾</span>
      <div class="topbar-actions"><span>NL</span><span>🔔</span><span>DS ▾</span></div>
    </header>
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Groenonderhoud</h1>
        <p class="page-desc">Seizoensplanning maai- en snoeibeurten per site — lopend jaar 2026.</p>
      </div>

      <div class="kpi-row">
        <div class="kpi-card kpi-success">
          <div class="kpi-label-top">UITGEVOERD</div>
          <div class="kpi-value">18</div>
          <div class="kpi-trend trend-up">beurten t.e.m. mei</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label-top">GEPLAND RESTEREND</div>
          <div class="kpi-value">31</div>
          <div class="kpi-trend trend-neutral">jun – dec 2026</div>
        </div>
        <div class="kpi-card kpi-warning">
          <div class="kpi-label-top">EERSTVOLGENDE BEURT</div>
          <div class="kpi-value" style="font-size:18px">02/06</div>
          <div class="kpi-trend trend-neutral">Maaien · Gent</div>
        </div>
      </div>

      <div class="card" style="padding:0;overflow-x:auto;margin-top:8px">
        <table class="groen-table" id="groen-table">
          <thead>
            <tr id="header-row">
              <th class="col-site">Site / Type</th>
            </tr>
          </thead>
          <tbody id="groen-body"></tbody>
        </table>
        <div class="legenda" style="padding:14px 16px">
          <span><div class="dot dot-done" style="font-size:14px">✓</div>Uitgevoerd</span>
          <span><div class="dot dot-plan" style="font-size:14px">●</div>Gepland</span>
          <span><span style="font-size:20px;color:#ccc;line-height:1">—</span>Geen beurt</span>
          <span style="margin-left:auto;background:#fffbeb;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;color:#92400e">Huidige maand gemarkeerd</span>
        </div>
      </div>

    </main>
  </div>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="feedback.js"></script>
  <script>
    var maanden = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
    var huidigeMaand = new Date().getMonth();

    // 0=geen, 'D'=done, 'P'=planned
    var SITES = [
      {
        naam: 'Gent — Dok-Noord',
        maaien:  [0,'D','D','D','D','P','P','P','P','P',0,0],
        snoeien: [0,'D',0,0,0,0,0,0,0,'P','P',0]
      },
      {
        naam: 'Antwerpen — Haven',
        maaien:  [0,'D','D','D','D','P','P','P','P','P',0,0],
        snoeien: [0,'D',0,0,0,0,0,0,0,'P',0,0]
      },
      {
        naam: 'Brussel — Evere',
        maaien:  [0,'D','D','D','D','P','P','P','P',0,0,0],
        snoeien: [0,0,'D',0,0,0,0,0,0,'P','P',0]
      }
    ];

    function dotHtml(val, maandIdx) {
      var klasse = maandIdx === huidigeMaand ? ' huidig-col' : '';
      if (val === 'D') return '<td class="' + klasse + '"><div class="dot dot-done">✓</div></td>';
      if (val === 'P') return '<td class="' + klasse + '"><div class="dot dot-plan">●</div></td>';
      return '<td class="' + klasse + '"><span class="dot dot-none">—</span></td>';
    }

    // Header
    var headerRow = document.getElementById('header-row');
    maanden.forEach(function(m, i) {
      var th = document.createElement('th');
      th.textContent = m;
      if (i === huidigeMaand) th.style.background = '#fffbeb';
      headerRow.appendChild(th);
    });

    // Rijen
    var tbody = document.getElementById('groen-body');
    SITES.forEach(function(site) {
      // Siteheader
      var siteRow = document.createElement('tr');
      siteRow.innerHTML = '<td class="col-site" colspan="13" style="background:#f4f6f8;font-size:12px;font-weight:700;color:var(--color-dark);padding:8px 12px;border-top:2px solid var(--color-border)">' + site.naam + '</td>';
      tbody.appendChild(siteRow);

      // Maaien
      var mRow = document.createElement('tr');
      mRow.className = 'type-row';
      mRow.innerHTML = '<td class="col-site">Maaien</td>' + site.maaien.map(function(v,i){ return dotHtml(v,i); }).join('');
      tbody.appendChild(mRow);

      // Snoeien
      var sRow = document.createElement('tr');
      sRow.className = 'type-row';
      sRow.innerHTML = '<td class="col-site">Snoeien</td>' + site.snoeien.map(function(v,i){ return dotHtml(v,i); }).join('');
      tbody.appendChild(sRow);
    });
  </script>
</body>
</html>
