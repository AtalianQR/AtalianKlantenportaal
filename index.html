<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATALIAN Klantenportaal — Aanmelden</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-wrap { width: 100%; max-width: 380px; padding: 24px; }
    .login-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
    .login-logo span { font-size: 22px; font-weight: 800; letter-spacing: -.5px; color: var(--color-dark); }
    .login-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.10); padding: 36px 32px; }
    .login-card h2 { font-size: 18px; font-weight: 700; color: var(--color-dark); margin: 0 0 6px; }
    .login-card p { font-size: 13px; color: var(--color-text-2); margin: 0 0 28px; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--color-dark); margin-bottom: 6px; }
    .login-field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--color-border); border-radius: 6px; box-sizing: border-box; color: var(--color-dark); background: #f9fafb; transition: border-color .15s; }
    .login-field input:focus { outline: none; border-color: var(--color-accent); background: #fff; }
    .login-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: var(--color-accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
    .login-btn:hover { opacity: .88; }
    .login-error { display: none; margin-top: 14px; padding: 10px 14px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; font-size: 13px; color: #b91c1c; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 28 28">
        <rect x="0"  y="0"  width="12" height="12" rx="2" fill="#4A90D9"/>
        <rect x="16" y="0"  width="12" height="12" rx="2" fill="#74AE25"/>
        <rect x="0"  y="16" width="12" height="12" rx="2" fill="#F4A300"/>
        <rect x="16" y="16" width="12" height="12" rx="2" fill="#D93025"/>
      </svg>
      <span>ATALIAN.</span>
    </div>
    <div class="login-card">
      <h2>Welkom terug</h2>
      <p>Meld u aan om uw klantenportaal te openen.</p>
      <form id="login-form" autocomplete="off">
        <div class="login-field">
          <label for="voornaam">Voornaam</label>
          <input type="text" id="voornaam" name="voornaam" placeholder="Uw voornaam" autocomplete="given-name" required>
        </div>
        <div class="login-field">
          <label for="wachtwoord">Wachtwoord</label>
          <input type="password" id="wachtwoord" name="wachtwoord" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">Aanmelden</button>
        <div class="login-error" id="login-error">Wachtwoord onjuist. Probeer opnieuw.</div>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var naam = document.getElementById('voornaam').value.trim();
      var ww   = document.getElementById('wachtwoord').value;
      if (ww === 'TryMe' && naam) {
        sessionStorage.setItem('naam', naam);
        window.location.href = 'home.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
