<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATALIAN Klantenportaal — Aanmelden</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #F2F2F2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      /* Atalian oranje streep bovenaan — consistent met topbar */
      border-top: 4px solid #EC732C;
    }
    .login-wrap { width: 100%; max-width: 380px; padding: 24px; }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 36px;
    }
    .login-logo span {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #141414;
    }
    .login-card {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
      padding: 36px 32px;
    }
    .login-card h2 {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #141414;
      margin: 0 0 6px;
    }
    .login-card p { font-size: 13px; color: #6E7A81; margin: 0 0 28px; }
    .login-field { margin-bottom: 16px; }
    .login-field label {
      display: block;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #6E7A81;
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      padding: 10px 12px;
      font-family: 'Source Sans 3', Arial, sans-serif;
      font-size: 14px;
      border: 1px solid #D6D6D6;
      border-radius: 4px;
      box-sizing: border-box;
      color: #141414;
      background: #f9f9f9;
      transition: border-color .15s;
    }
    .login-field input:focus { outline: none; border-color: #EC732C; background: #fff; }
    .login-btn {
      width: 100%;
      padding: 12px;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: #EC732C;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .login-btn:hover { background: #d05e1a; }
    .login-error { display: none; margin-top: 14px; padding: 10px 14px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 4px; font-size: 13px; color: #b91c1c; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <img src="atalian-logo.png" alt="ATALIAN Global Services" style="height:80px;">
    </div>
    <div class="login-card">
      <h2>Welkom terug</h2>
      <p>Meld u aan om uw klantenportaal te openen.</p>
      <form id="login-form" autocomplete="off">
        <div class="login-field">
          <label for="voornaam">Voornaam</label>
          <input type="text" id="voornaam" name="voornaam" placeholder="Uw voornaam" autocomplete="given-name" required>
        </div>
        <div class="login-field">
          <label for="wachtwoord">Wachtwoord</label>
          <input type="password" id="wachtwoord" name="wachtwoord" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">Aanmelden</button>
        <div class="login-error" id="login-error">Wachtwoord onjuist. Probeer opnieuw.</div>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var naam = document.getElementById('voornaam').value.trim();
      var ww   = document.getElementById('wachtwoord').value;
      if (ww === 'TryMe' && naam) {
        sessionStorage.setItem('naam', naam);
        window.location.href = 'instructies.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
